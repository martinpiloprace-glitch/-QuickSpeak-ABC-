        function showMain() {
            nav.innerHTML = '';
            wrapper.innerHTML = '';
            Object.keys(data).forEach(topic => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = topic;
                card.onclick = () => showSub(topic);
                wrapper.appendChild(card);
            });
        }

        function showSub(topic) {
            nav.innerHTML = '<button class="back-btn" onclick="showMain()">Zpět na témata</button>';
            wrapper.innerHTML = '';
            Object.keys(data[topic]).forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.textContent = item;
                card.onclick = () => showTranslation(topic, item);
                wrapper.appendChild(card);
            });
        }

        function showTranslation(topic, item) {
            nav.innerHTML = '<button class="back-btn" onclick="showSub(\'' + topic + '\')">Zpět na výběr</button>';
            wrapper.innerHTML = `
                <div class="card">
                    <p>Česky: ${item}</p>
                    <div class="translation-box">${data[topic][item]}</div>
                </div>
            `;
        }

        showMain();
